name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v1.2.0)"
        required: true
        default: "v0.0.0-manual"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BindProxy.sln

      - name: Build
        run: dotnet build BindProxy.sln -c Release --no-restore

      - name: Test
        run: dotnet test BindProxy.sln -c Release --no-build

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build release artifacts
        shell: cmd
        run: release.bat ${{ steps.version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bindproxy-${{ steps.version.outputs.version }}-win-x64
          path: release/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BindProxy ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release/*.zip
